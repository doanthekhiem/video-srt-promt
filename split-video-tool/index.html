<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cắt video N phần</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --ok: #22c55e;
      --err: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    main {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.35rem; font-weight: 600; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.45; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    select, input[type="number"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; }
    .row input { width: auto; margin: 0; }
    .row label.inline { margin: 0; color: var(--text); font-size: 0.9rem; }
    button {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.5;
      display: none;
    }
    #status.show { display: block; }
    #status.ok { background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.35); }
    #status.err { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.35); }
    #status.run { background: rgba(59, 130, 246, 0.12); border: 1px solid rgba(59, 130, 246, 0.35); }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 0.8rem; }
    th, td { text-align: left; padding: 0.35rem 0.5rem 0.35rem 0; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: -0.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <main>
    <h1>Cắt video N phần</h1>
    <p class="sub">
      Các phần đầu làm tròn bội 5 phút (vd. 58 phút → 4 phần: 15p + 15p + 15p + 13p).
      Stream copy, không re-encode. Output: <code>videos-cut/</code>
    </p>

    <label for="video">Video (thư mục videos/)</label>
    <select id="video" required>
      <option value="">— Đang tải danh sách —</option>
    </select>

    <label for="parts">Số phần cắt (N)</label>
    <input type="number" id="parts" min="2" max="50" value="4" required>
    <p class="hint">Ví dụ: video 58 phút, N = 4 → 3 phần × 15 phút, phần cuối ~13 phút.</p>

    <div class="row">
      <input type="checkbox" id="overwrite">
      <label class="inline" for="overwrite">Ghi đè file _p1, _p2... đã có</label>
    </div>

    <button type="button" id="run">Cắt video</button>
    <div id="status"></div>
  </main>

  <script>
    const videoEl = document.getElementById("video");
    const partsEl = document.getElementById("parts");
    const overwriteEl = document.getElementById("overwrite");
    const runBtn = document.getElementById("run");
    const statusEl = document.getElementById("status");

    function setStatus(kind, html) {
      statusEl.className = "show " + kind;
      statusEl.innerHTML = html;
    }

    async function loadVideos() {
      try {
        const r = await fetch("/api/videos");
        const data = await r.json();
        videoEl.innerHTML = "";
        if (!data.videos.length) {
          videoEl.innerHTML = '<option value="">(Không có file trong videos/)</option>';
          return;
        }
        data.videos.forEach((name) => {
          const o = document.createElement("option");
          o.value = name;
          o.textContent = name;
          videoEl.appendChild(o);
        });
      } catch (e) {
        videoEl.innerHTML = '<option value="">Lỗi: mở qua start.bat (server chưa chạy)</option>';
        setStatus("err", "Không kết nối server. Chạy <strong>start.bat</strong> hoặc <code>python split_video.py</code>.");
      }
    }

    runBtn.addEventListener("click", async () => {
      const video = videoEl.value;
      const parts = parseInt(partsEl.value, 10);
      if (!video) {
        setStatus("err", "Chọn video.");
        return;
      }
      if (parts < 2 || parts > 50) {
        setStatus("err", "Số phần từ 2 đến 50.");
        return;
      }

      runBtn.disabled = true;
      setStatus("run", "Đang cắt bằng ffmpeg… (có thể mất vài phút)");

      try {
        const r = await fetch("/api/split", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            video,
            parts,
            overwrite: overwriteEl.checked,
          }),
        });
        const data = await r.json();
        if (!r.ok || !data.ok) {
          throw new Error(data.error || "Lỗi không xác định");
        }
        let rows = data.segments.map((s) =>
          `<tr><td>p${s.part}</td><td>${s.duration}</td><td>${s.start} → ${s.end}</td></tr>`
        ).join("");
        setStatus("ok",
          `<strong>Xong.</strong> ${data.input} (${data.input_duration}) → ${data.parts} phần<br>` +
          `<table><thead><tr><th>File</th><th>Độ dài</th><th>Khoảng</th></tr></thead><tbody>${rows}</tbody></table>` +
          `<br>Thư mục: <code>${data.output_dir}</code>`
        );
      } catch (e) {
        setStatus("err", e.message);
      } finally {
        runBtn.disabled = false;
      }
    });

    loadVideos();
  </script>
</body>
</html>
